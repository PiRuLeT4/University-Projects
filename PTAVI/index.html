<html>
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC Práctica final</title>
    <style>
    button {
        padding: 8px 16px;
    }

    video {
        width: 100%;
    }

    .option {
        margin-bottom: 8px;
    }

    #media {
        max-width: 1280px;
    }
    </style>
</head>
<body>

<div class="option">
    <input id="use-stun" type="checkbox"/>
    <label for="use-stun">Use STUN server</label>
</div>

{% for video in videos %}
<h3>{{ titulos[loop.index0] }}</h3>
<p>{{ descripciones[loop.index0] }}</p>
<button id="start {{ video }}" onclick="start('{{ video }}')">{{video}}</button>
<button id="stop {{ video }}" style="display: none" onclick="stop('{{ video }}')">Stop</button>
<br>
{% endfor %}

<div id="media">
    <h2>Media</h2>

    <audio id="audio" autoplay="true"></audio>
    <video id="video" autoplay="true" playsinline="true"></video>
</div>

<script src="client.js"></script>
</body>
</html>
