<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-obb-collider-component/dist/aframe-obb-collider-component.min.js"></script>

    <script src="componentes.js"></script>
    <script src="cam_render.js"></script>
    <title>Juego A-frame</title>
  </head> 
  <body>
    <a-scene background="#000" xr-mode-ui="XRMode: xr">
      <a-assets>
        <audio id="sonido_comedor" src="assets/sonido_comedor.mp3"></audio>
        <canvas id="vistaHUD"></canvas>
        <canvas id="vistaCENITAL"></canvas>
      </a-assets>

      <a-entity juego="num_globos: 15; num_comedores: 17; col_globos: cyan; col_comedores: purple; col_jugador: red;
                       tam_globos: 0.5; tam_comedores: 0.5; tam_jugador: 0.002;
                       vel_globos: 1; vel_comedores: 2;
                       intervalo_globos: 3000;
                       dir_destructor: 0 0 -1; lejos_destructor: 10; cerca_destructor: 2;">
      </a-entity>

      <!-- Cámara principal con HUD -->
      <a-entity id="soporte" position="0 1.5 0" movement-controls="fly: true">
        <a-camera camrender="cid: vistaHUD" wasd-controls="fly: true" look-controls position="0 0 15" fov="80">
          
          <!-- MARCADOR -->
          <a-entity marcador position="1.2 -0.6 -1.5" scale="0.6 0.6 0.6"></a-entity>

          <!-- MINIATURA DE LA CÁMARA CENITAL -->
          <a-plane
            position="-1.2 -0.6 -1.5"
            rotation="0 0 0"
            width="0.8"
            height="0.6"
            material="src: #vistaCENITAL"
            canvas-updater>
          </a-plane>
        </a-camera>
      </a-entity>

      <!-- Cámara cenital-->
      <a-entity camera="active: false"
                camrender="cid: vistaCENITAL; width: 400; height: 200"
                position="0 25 0"
                rotation="-90 0 0">
      </a-entity>
    </a-scene>
  </body>
</html>
